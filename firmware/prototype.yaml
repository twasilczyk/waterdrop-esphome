esphome:
  name: prototype
  friendly_name: prototype
  includes:
    - helpers.h
  on_boot:
    - priority: 10
      then:
        - light.turn_on:
            id: status_led
            brightness: 20%
            red: 100%
            green: 0%
            blue: 0%
    - priority: 1000
      then:
        - delay: 10ms
        - light.turn_on:
            id: status_led
            brightness: 20%
            red: 100%
            green: 60%
            blue: 0%


esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret common_api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  on_connect:
    - delay: 100ms
    - light.turn_on:
        id: status_led
        red: 0%
        green: 100%
        blue: 0%
        brightness: 20%

script:
  - id: send_frame
    mode: queued
    parameters:
      command: uint8_t
      payload: std::vector<uint8_t>
    then:
      - lambda: |-
          auto checksum = [](const std::vector<uint8_t> &bytes) -> uint8_t {
            uint8_t s = 0;
            for (auto b : bytes) s += b;
            return s;
          };

          static std::vector<uint8_t> frame;
          frame.clear();
          frame.reserve(payload.size() + 5);

          frame.push_back(0xAA);
          frame.push_back(0x55);
          bool payload_checksum = false;
          if (command == 0xC2 || command == 0x22) payload_checksum = true;

          uint8_t len = payload.size() + 5 + (payload_checksum ? 1 : 0);
          frame.push_back(len);
          frame.push_back(command);

          frame.insert(frame.end(), payload.begin(), payload.end());

          uint8_t frame_checksum = checksum(frame);
          if (payload_checksum) {
            uint8_t payload_checksum = checksum(payload);
            if (command == 0x22) payload_checksum -= payload[0];
            frame.push_back(payload_checksum);
          }
          frame.push_back(frame_checksum);

          id(uart_bus).write_array(frame.data(), frame.size());

  - id: send_message
    mode: queued
    parameters:
      p22: std::vector<uint8_t>
      pC5: std::vector<uint8_t>

    then:
      - logger.log: "Waterdrop Message"
      - script.execute:
          id: send_frame
          command: 0xC2
                                      # STATE:
                                      #  Boot: FF
                                      #  Screen on: F1, F7
                                      #  Flush: F3, F5, F6
                                      #  Screen off: all others

                                      # FLG2: no effect
                                      #  0x03 - regular
                                      #  0x01 - present during flush and boot

                                      # ERR:
                                      #  Display priority: E02 > E03 > E04 > E01
                                      #  0b00000100: E02
                                      #  0b00000001: E03
                                      #  0b00000010: E04
                                      #  0b10000000: E01

                                     # STATE   FLG   ERR
          payload: std::vector<uint8_t>{0xF1, 0x03, 0x00}
          #payload: !lambda |-
          #  return std::vector<uint8_t>{0xF1, counterLo(), 0x00};
          #payload: !lambda |-
          #  return std::vector<uint8_t>{bflip(0xF1, 0, id(hex_b1)), bflip(0x03, 1, id(hex_b1)), bflip(0x00, 2, id(hex_b1))};
      - delay: 40ms
      - script.execute:
          id: send_frame
          command: 0x22
          payload: !lambda |-
            return p22;
      - delay: 30ms
      - script.execute:
          id: send_frame
          command: 0xC5
          payload: !lambda |-
            return pC5;
      - delay: 40ms

interval:
  - interval: 500ms
    then:
      - script.execute:
          id: send_message
          p22: std::vector<uint8_t>{0x0E, 0xFF, 0xFF, 0xFF, 0xFF, 0xFF, 0xFF, 0xFF, 0x11}
                                  # A: 00 (rare) or 0A
                                  #                                             A
          pC5: std::vector<uint8_t>{0x01, 0x00, 0x40, 0x22, 0x00, 0x00, 0x00, 0x0A}
      - script.execute:
          id: send_message
                                  # CF, RO, CB (H, L): filter total life (when it turns red).
                                  #       >- CF   -<  >-  RO  -<  >-  CB  <-
          p22: std::vector<uint8_t>{0x0F, 0xFF, 0xFF, 0xFF, 0xFF, 0xFe, 0x99, 0xFF, 0x33}
                                  # A: 00, 34, 35
                                  #                           A
          pC5: std::vector<uint8_t>{0x02, 0x00, 0x00, 0x00, 0x35, 0x08, 0x34, 0x00}
      - script.execute:
          id: send_message
                                      # TDS: 1-999 value with 1000-9999 displaying as F-codes.
                                      # A: 0C or 0E
                                      #                               |   H     TDS    L      |         A
          p22: !lambda |-
            return std::vector<uint8_t>{0x03, 0x00, 0x00, 0x00, 0x00, counterHi(), counterLo(), 0x00, 0x0C};
          #p22: !lambda |-
          #  return std::vector<uint8_t>{0x03, 0xFF, 0xFF, 0xFF, 0xFF, tdsExploitHi(id(hex_b1)), tdsExploitLo(id(hex_b1)), 0xFF, 0x0C};
                                  # A: 0C, 0E, 0D (rare), 19 (rare)
                                  # B: 01, 03
                                  # C: 90, B0
                                  #               A     B     C
          pC5: std::vector<uint8_t>{0x03, 0x00, 0x0E, 0x01, 0xB0, 0x00, 0x0A, 0x00}
      - script.execute:
          id: send_message
                                  #        CF, RO, CB (H, L): filter used life. Turns orange at 360 units before red
                                  #       >- CF   -<  >-  RO  -<  >-  CB  <-
          p22: std::vector<uint8_t>{0x02, 0xFE, 0x96, 0xFE, 0x97, 0xFE, 0x98, 0x00, 0x00}
                                  # A: F1, F3, FF
                                  # B: F1, F3
                                  #         A     B
          pC5: std::vector<uint8_t>{0x04, 0xF1, 0xF1, 0x00, 0x00, 0x00, 0x0E, 0xFF}
      - script.execute:
          id: send_message
                                  # A: 0A or 00 (rare) - A always the same and same in 01 and 0D slots
                                  #               A           A
         #p22: std::vector<uint8_t>{0x01, 0x00, 0x0A, 0x00, 0x0A, 0x00, 0x0A, 0x00, 0x00}
          p22: std::vector<uint8_t>{0x0D, 0x00, 0x0A, 0x00, 0x0A, 0x00, 0x0A, 0x00, 0x00}
                                  # A: 0C, 0E, 0D (rare), 19 (rare) - both A always the same, also matches C5 03 A field
                                  #                      A     A
          pC5: std::vector<uint8_t>{0x05, 0x00, 0x00, 0x0E, 0x0E, 0x00, 0x00, 0x00}

uart:
  id: uart_bus
  tx_pin:
    number: GPIO5
    inverted: true
  rx_pin: GPIO6
  baud_rate: 9600
  debug:
    direction: BOTH
    dummy_receiver: true

light:
  - platform: esp32_rmt_led_strip
    pin: GPIO21
    num_leds: 1
    chipset: ws2812
    rgb_order: RGB
    id: status_led
    name: "Status LED"
    default_transition_length: 0s
    restore_mode: ALWAYS_OFF

button:
  - platform: template
    name: "Send init command"
    on_press:
      then:
        - uart.write:
            id: uart_bus
            data: [0xAA, 0x55, 0x09, 0xC2, 0xFF, 0x01, 0x00, 0x00, 0xCA]

globals:
  - id: hex_b1
    type: uint8_t
    restore_value: yes
    initial_value: '0'
  - id: hex_b2
    type: uint8_t
    restore_value: yes
    initial_value: '0'
  - id: hex_w1
    type: uint16_t
    restore_value: yes
    initial_value: '0'

number:
  - platform: template
    name: "Hex Byte 1"
    id: hex_byte_1
    min_value: 0
    max_value: 255
    step: 1
    set_action:
      - globals.set:
          id: hex_b1
          value: !lambda 'return (uint8_t) x;'

  - platform: template
    name: "Hex Byte 2"
    id: hex_byte_2
    min_value: 0
    max_value: 255
    step: 1
    set_action:
      - globals.set:
          id: hex_b2
          value: !lambda 'return (uint8_t) x;'
  - platform: template
    name: "Word 1"
    id: hex_w1_disp
    min_value: 0
    max_value: 65535
    step: 1
    set_action:
      - globals.set:
          id: hex_w1
          value: !lambda 'return (uint16_t) x;'

# Read-only text sensor that shows the combined two-byte hex value (e.g. "0A FF").
text_sensor:
  - platform: template
    name: "Hex Bytes"
    id: hex_bytes_sensor
    update_interval: 100ms
    lambda: |-
      char buf[6];
      sprintf(buf, "%02X%02X", id(hex_b1), id(hex_b2));
      return std::string(buf);
  - platform: template
    name: "Hex Word"
    id: hex_word_sensor
    update_interval: 100ms
    lambda: |-
      char buf[6];
      sprintf(buf, "%04X", id(hex_w1));
      return std::string(buf);
