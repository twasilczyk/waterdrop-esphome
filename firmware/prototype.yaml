esphome:
  name: prototype
  friendly_name: prototype
  on_boot:
    - priority: 10
      then:
        - light.turn_on:
            id: status_led
            brightness: 20%
            red: 100%
            green: 0%
            blue: 0%
    - priority: 1000
      then:
        - delay: 10ms
        - light.turn_on:
            id: status_led
            brightness: 20%
            red: 100%
            green: 60%
            blue: 0%


esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret common_api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  on_connect:
    - delay: 100ms
    - light.turn_on:
        id: status_led
        red: 0%
        green: 100%
        blue: 0%
        brightness: 20%

light:
  - platform: esp32_rmt_led_strip
    pin: GPIO21
    num_leds: 1
    chipset: ws2812
    rgb_order: RGB
    id: status_led
    name: "Status LED"
    default_transition_length: 0s
    restore_mode: ALWAYS_OFF
