switch:
  - platform: gpio
    id: serial_enabled
    name: "Serial enabled"
    internal: true
    pin: GPIO2
    inverted: true
    restore_mode: ALWAYS_ON

uart:
  - id: uart_faucet
    tx_pin: GPIO5
    rx_pin: GPIO6
    baud_rate: 9600
  - id: uart_ro
    tx_pin:
      number: GPIO3
      ignore_strapping_warning: true  # Safe: GPIO3 is output only
    rx_pin: GPIO4
    baud_rate: 9600

waterdrop_serial_ro:
  id: waterdrop_ro
  uart_id: uart_ro
  request_unknown_values: true

waterdrop_serial_faucet:
  id: waterdrop_faucet
  uart_id: uart_faucet
