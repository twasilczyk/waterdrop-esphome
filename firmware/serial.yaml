esphome:
  includes:
    - helpers.h

switch:
  - platform: gpio
    id: serial_enabled
    name: "Serial enabled"
    internal: true
    pin: GPIO2
    inverted: true
    restore_mode: ALWAYS_ON

uart:
  - id: uart_faucet
    tx_pin: GPIO5
    rx_pin: GPIO6
    baud_rate: 9600
  - id: uart_ro
    tx_pin:
      number: GPIO3
      ignore_strapping_warning: true  # Safe: GPIO3 is output only
    rx_pin: GPIO4
    baud_rate: 9600

waterdrop_serial_ro:
  id: waterdrop_ro
  uart_id: uart_ro

waterdrop_serial_faucet:
  id: waterdrop_faucet
  uart_id: uart_faucet

globals:
  - id: hex_b1
    type: uint8_t
    restore_value: yes
    initial_value: '0'
  - id: hex_b2
    type: uint8_t
    restore_value: yes
    initial_value: '0'
  - id: hex_w1
    type: uint16_t
    restore_value: yes
    initial_value: '0'

number:
  - platform: template
    name: "Hex Byte 1"
    id: hex_byte_1
    disabled_by_default: true
    min_value: 0
    max_value: 255
    step: 1
    set_action:
      - globals.set:
          id: hex_b1
          value: !lambda 'return (uint8_t) x;'

  - platform: template
    name: "Hex Byte 2"
    id: hex_byte_2
    disabled_by_default: true
    min_value: 0
    max_value: 255
    step: 1
    set_action:
      - globals.set:
          id: hex_b2
          value: !lambda 'return (uint8_t) x;'
  - platform: template
    name: "Word 1"
    id: hex_w1_disp
    disabled_by_default: true
    min_value: 0
    max_value: 65535
    step: 1
    set_action:
      - globals.set:
          id: hex_w1
          value: !lambda 'return (uint16_t) x;'

# Read-only text sensor that shows the combined two-byte hex value (e.g. "0A FF").
text_sensor:
  - platform: template
    name: "Hex Bytes"
    id: hex_bytes_sensor
    disabled_by_default: true
    update_interval: 100ms
    lambda: |-
      char buf[6];
      sprintf(buf, "%02X%02X", id(hex_b1), id(hex_b2));
      return std::string(buf);
  - platform: template
    name: "Hex Word"
    id: hex_word_sensor
    disabled_by_default: true
    update_interval: 100ms
    lambda: |-
      char buf[6];
      sprintf(buf, "%04X", id(hex_w1));
      return std::string(buf);
