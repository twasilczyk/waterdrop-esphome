# Follows filter_power - otherwise, RO unit will leech power from serial line.
# TODO: do it electrically based on 5V line from RO unit.
output:
  - platform: gpio
    id: serial_enabled
    pin: GPIO2
    inverted: true

uart:
  - id: uart_faucet
    tx_pin: GPIO5
    rx_pin: GPIO6
    baud_rate: 9600
  - id: uart_ro
    tx_pin:
      number: GPIO3
      ignore_strapping_warning: true  # Safe: GPIO3 is output only
    rx_pin: GPIO4
    baud_rate: 9600

waterdrop_serial_ro:
  id: waterdrop_ro
  uart_id: uart_ro
  request_unknown_values: false

waterdrop_serial_faucet:
  id: waterdrop_faucet
  uart_id: uart_faucet
