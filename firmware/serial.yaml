esphome:
  includes:
    - helpers.h

switch:
  - platform: gpio
    id: serial_enabled
    name: "Serial enabled"
    internal: true
    pin: GPIO2
    inverted: true
    restore_mode: ALWAYS_ON

uart:
  - id: uart_faucet
    tx_pin: GPIO5
    rx_pin: GPIO6
    baud_rate: 9600
  - id: uart_ro
    tx_pin:
      number: GPIO3
      ignore_strapping_warning: true  # Safe: GPIO3 is output only
    rx_pin: GPIO4
    baud_rate: 9600

waterdrop_serial_ro:
  id: waterdrop_ro
  uart_id: uart_ro

waterdrop_serial_faucet:
  id: waterdrop_faucet
  uart_id: uart_faucet

script:
  - id: send_message
    mode: queued
    parameters:
      p22: std::vector<uint8_t>
      pC5: std::vector<uint8_t>

    then:
      - lambda: |-
          // STATE:
          //  Boot: FF
          //  Screen on: F1, F7
          //  Flush: F3, F5, F6
          //  Screen off: all others

          // FLG2: no effect
          //  0x03 - regular
          //  0x01 - present during flush and boot

          // ERR:
          //  Display priority: E02 > E03 > E04 > E01
          //  0b00000100: E02
          //  0b00000001: E03
          //  0b00000010: E04
          //  0b10000000: E01

          //                                                        STATE   FLG   ERR
          id(waterdrop_faucet).send_frame(0xC2, std::vector<uint8_t>{0xF1, 0x03, 0x00});
          // id(waterdrop_faucet).send_frame(0xC2, std::vector<uint8_t>{0xF1, counterLo(), 0x00});
          // id(waterdrop_faucet).send_frame(
          //     0xC2,
          //     std::vector<uint8_t>{bflip(0xF1, 0, id(hex_b1)), bflip(0x03, 1, id(hex_b1)), bflip(0x00, 2, id(hex_b1))});
      - delay: 40ms
      - lambda: |-
          id(waterdrop_faucet).send_frame(0x22, p22);
      - delay: 30ms
      - lambda: |-
          id(waterdrop_faucet).send_frame(0xC5, pC5);
      - delay: 40ms

interval:
  - interval: 5000ms
    then:
      - script.execute:
          id: send_message
          p22: std::vector<uint8_t>{0x0E, 0xFF, 0xFF, 0xFF, 0xFF, 0xFF, 0xFF, 0xFF, 0x11}
                                  # A: 00 (rare) or 0A
                                  #                                             A
          pC5: std::vector<uint8_t>{0x01, 0x00, 0x40, 0x22, 0x00, 0x00, 0x00, 0x0A}
      - script.execute:
          id: send_message
                                  # CF, RO, CB (H, L): filter total life (when it turns red).
                                  #       >- CF   -<  >-  RO  -<  >-  CB  <-
          p22: std::vector<uint8_t>{0x0F, 0xFF, 0xFF, 0xFF, 0xFF, 0xFe, 0x99, 0xFF, 0x33}
                                  # A: 00, 34, 35
                                  #                           A
          pC5: std::vector<uint8_t>{0x02, 0x00, 0x00, 0x00, 0x35, 0x08, 0x34, 0x00}
      - script.execute:
          id: send_message
                                      # TDS: 1-999 value with 1000-9999 displaying as F-codes.
                                      # A: 0C or 0E
                                      #                               |   H     TDS    L      |         A
          p22: !lambda |-
            return std::vector<uint8_t>{0x03, 0x00, 0x00, 0x00, 0x00, counterHi(), counterLo(), 0x00, 0x0C};
          #p22: !lambda |-
          #  return std::vector<uint8_t>{0x03, 0xFF, 0xFF, 0xFF, 0xFF, tdsExploitHi(id(hex_b1)), tdsExploitLo(id(hex_b1)), 0xFF, 0x0C};
                                  # A: 0C, 0E, 0D (rare), 19 (rare)
                                  # B: 01, 03
                                  # C: 90, B0
                                  #               A     B     C
          pC5: std::vector<uint8_t>{0x03, 0x00, 0x0E, 0x01, 0xB0, 0x00, 0x0A, 0x00}
      - script.execute:
          id: send_message
                                  #        CF, RO, CB (H, L): filter used life. Turns orange at 360 units before red
                                  #       >- CF   -<  >-  RO  -<  >-  CB  <-
          p22: std::vector<uint8_t>{0x02, 0xFE, 0x96, 0xFE, 0x97, 0xFE, 0x98, 0x00, 0x00}
                                  # A: F1, F3, FF
                                  # B: F1, F3
                                  #         A     B
          pC5: std::vector<uint8_t>{0x04, 0xF1, 0xF1, 0x00, 0x00, 0x00, 0x0E, 0xFF}
      - script.execute:
          id: send_message
                                  # A: 0A or 00 (rare) - A always the same and same in 01 and 0D slots
                                  #               A           A
         #p22: std::vector<uint8_t>{0x01, 0x00, 0x0A, 0x00, 0x0A, 0x00, 0x0A, 0x00, 0x00}
          p22: std::vector<uint8_t>{0x0D, 0x00, 0x0A, 0x00, 0x0A, 0x00, 0x0A, 0x00, 0x00}
                                  # A: 0C, 0E, 0D (rare), 19 (rare) - both A always the same, also matches C5 03 A field
                                  #                      A     A
          pC5: std::vector<uint8_t>{0x05, 0x00, 0x00, 0x0E, 0x0E, 0x00, 0x00, 0x00}

globals:
  - id: hex_b1
    type: uint8_t
    restore_value: yes
    initial_value: '0'
  - id: hex_b2
    type: uint8_t
    restore_value: yes
    initial_value: '0'
  - id: hex_w1
    type: uint16_t
    restore_value: yes
    initial_value: '0'

number:
  - platform: template
    name: "Hex Byte 1"
    id: hex_byte_1
    disabled_by_default: true
    min_value: 0
    max_value: 255
    step: 1
    set_action:
      - globals.set:
          id: hex_b1
          value: !lambda 'return (uint8_t) x;'

  - platform: template
    name: "Hex Byte 2"
    id: hex_byte_2
    disabled_by_default: true
    min_value: 0
    max_value: 255
    step: 1
    set_action:
      - globals.set:
          id: hex_b2
          value: !lambda 'return (uint8_t) x;'
  - platform: template
    name: "Word 1"
    id: hex_w1_disp
    disabled_by_default: true
    min_value: 0
    max_value: 65535
    step: 1
    set_action:
      - globals.set:
          id: hex_w1
          value: !lambda 'return (uint16_t) x;'

# Read-only text sensor that shows the combined two-byte hex value (e.g. "0A FF").
text_sensor:
  - platform: template
    name: "Hex Bytes"
    id: hex_bytes_sensor
    disabled_by_default: true
    update_interval: 100ms
    lambda: |-
      char buf[6];
      sprintf(buf, "%02X%02X", id(hex_b1), id(hex_b2));
      return std::string(buf);
  - platform: template
    name: "Hex Word"
    id: hex_word_sensor
    disabled_by_default: true
    update_interval: 100ms
    lambda: |-
      char buf[6];
      sprintf(buf, "%04X", id(hex_w1));
      return std::string(buf);
