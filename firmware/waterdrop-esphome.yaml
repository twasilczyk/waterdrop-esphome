esphome:
  name: waterdrop-esphome
  friendly_name: Waterdrop RO system

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

external_components:
  - source:
      type: local
      path: components

packages:
  powerctrl: !include powerctrl.yaml
  serial: !include serial.yaml
  status: !include status.yaml
  valve: !include valve.yaml

api:
  encryption:
    key: !secret common_api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  logs:
    script: WARN
    text_sensor: WARN

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
