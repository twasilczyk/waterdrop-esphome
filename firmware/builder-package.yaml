substitutions:
  waterdrop_report_unknown_values: false
  waterdrop_request_unknown_values: false

packages:
  base: !include base.yaml

external_components:
  - source:
      type: git
      url: https://github.com/twasilczyk/waterdrop-esphome
      ref: ${branch}
      path: firmware/components
    components:
      - cxxflags
      - waterdrop_serial
      - waterdrop_serial_faucet
      - waterdrop_serial_ro

logger:
  logs:
    waterdrop_serial_faucet: INFO
    waterdrop_serial_ro: INFO
